apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-deployment
  labels:
    app: streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
      - name: streamlit # v0.9.0
        image: slithiaote/umap-streamlit@sha256:7d02b5ac1409b707c1decb0329ef8a2ef588eb6882ca38188c44c24393d38de6
        ports:
        - containerPort: 8501