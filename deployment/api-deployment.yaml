apiVersion: apps/v1
kind: Deployment
metadata:
  name: umap-deployment
  labels:
    app: umap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: umap
  template:
    metadata:
      labels:
        app: umap
    spec:
      containers:
      - name: umap # v0.9.0
        image: slithiaote/umap-api@sha256:59d2a37dd7a0a34a43f61179765b36cda768bf1a0462166a1a0fa19a0bfa0ff5
        ports:
        - containerPort: 8000
        env:
        - name: APP_ENV
          value: "prod_user"
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-secrets
              key: tracking-uri
        - name: MLFLOW_TRACKING_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlflow-secrets
              key: username
        - name: MLFLOW_TRACKING_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-secrets
              key: password