apiVersion: apps/v1
kind: Deployment
metadata:
  name: umap-deployment
  labels:
    app: umap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: umap
  template:
    metadata:
      labels:
        app: umap
    spec:
      containers:
      - name: umap # v0.4
        image: slithiaote/umap-api@sha256:58ad4c8a71694a8da93ac5c4ca6b754153d4484059e5ccac2ed88bdc1d05a75e
        ports:
        - containerPort: 8000
        env:
        - name: APP_ENV
          value: "prod_user"
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-secrets
              key: tracking-uri
        - name: MLFLOW_TRACKING_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlflow-secrets
              key: username
        - name: MLFLOW_TRACKING_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-secrets
              key: password