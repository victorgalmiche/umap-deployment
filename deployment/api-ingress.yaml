apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: umap-ingress
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 2m # limit request size
    nginx.ingress.kubernetes.io/limit-rps: "1" # limit requests per second
    nginx.ingress.kubernetes.io/limit-rpm: "60" 
    nginx.ingress.kubernetes.io/limit-connections: "2" 
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - umap-api-mmvs.lab.sspcloud.fr # ensure unique name
  rules:
  - host: umap-api-mmvs.lab.sspcloud.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: umap-service
            port:
              number: 80